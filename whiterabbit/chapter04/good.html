<p>어라, 이게 무슨...</p>
<p>"응? 무슨 일이에요?"</p>
<p>문을 여니 보인 것은, 용암이 가득한 방이었다.<br>그 가운데에 나무로 된 다리가 이어져 있었다.</p>
<p>"... 꼭 여길 지나가야 하나..."</p>
<p>하지만 다른 길이 없다.<br>그리고 이 다리는 지상까지 이어져있을 거라는 확신이 들었다.</p>
<p>어차피 용암에 빠져 죽으나 미궁에서 굶어 죽으나 다른 건 없으니.<br>나는 그 불안한 나무다리 위로 발걸음을 옮겼다.</p>
<p>현재 위치는 지하 20층.</p>
