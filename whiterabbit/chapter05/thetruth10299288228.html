<p>"...이제 진실을 알려줄 때가 된 것 같네요."</p>
<p>"이 모든 걸 만든 게 바로 저예요."</p>
<p>"그리고 당신을 여기 일부러 끌어들인 것도 맞고요."</p>
<p>"아무 의심도 하지 않고 함정에 걸려버린 거죠."</p>
<p>...</p>
<p>이 모든 게 리리스의 함정이었다니.</p>
<p>배신감, 분노... 온갖 감정들이 머릿속에 생겨난다.</p>
<p>나는 그만 이성을 잃고 리리스에게 달려나갔다.</p>
<p><i><a href="/chapter05/thetruth99277272611811.html" style="color:black">그리고 곧장 그 하얀 배신자의 목을 붙잡았다.</a></i></p>
