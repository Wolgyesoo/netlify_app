<p>답을 입력하자,</p>
<p>갑자기 물소리가 커졌다.</p>
<p>무슨 일인가 하고 봤더니,</p>
<p>물이 바닥부터 차오르고 있었다.</p>
<br>
<p>이대로 가면 난 물에 빠져 죽는다.</p>
<p>하지만 침착해야 한다.</p>
<p>물 위에 가만히 누우면 물에 뜬다더라.</p>
<br>
<p>그런...데?</p>
<p>물에 뜨지 않는다.</p>
<p>왜지? 도대체 왜?</p>
<p>그때 물소리 사이로 들리는 작은 목소리.</p>
<br><br><p>"...풋."</p><br><br>
<p>그건, 하얀 기만자의 목소리.</p>
<p>녀석은, 천장에 거꾸로 매달린 채로,</p>
<p>나를 비웃고 있었다.</p>
<br>
<p>물이... 점점... 위로...</p>
<p><span style="font-size:200%;font-weight:700">당신은 사망하였습니다.</span><br>
